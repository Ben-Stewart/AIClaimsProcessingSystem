[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @claims/shared build && pnpm --filter @claims/api db:generate:ci && pnpm --filter @claims/worker build"

[deploy]
startCommand = "pnpm --filter @claims/worker start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
