[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @claims/shared build && pnpm --filter @claims/api build"

[deploy]
releaseCommand = "pnpm --filter @claims/api db:migrate:prod"
startCommand = "pnpm --filter @claims/api start"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
